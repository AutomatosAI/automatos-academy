<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Automatos Academy — Learn AI architecture. Prove it.</title>
  <meta name="description" content="The Automatos learning model: Learn → Build → Decide → Prove → Ready. Flagship track — Anthropic Claude Certified Architect (CCA-F). Tutorials, labs, scenario drills, full mock exams, and an honest readiness score." />
  <meta name="theme-color" content="#0E1311" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/academy.css" />

  <!-- Anti-FOUC: apply the stored Automatos mood before first paint -->
  <script>
    (function () {
      try {
        var m = localStorage.getItem('automatos-mood');
        if (m !== 'bone' && m !== 'pitch') {
          m = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'pitch' : 'bone';
        }
        document.documentElement.setAttribute('data-mood', m);
      } catch (e) { document.documentElement.setAttribute('data-mood', 'bone'); }
    })();
  </script>
</head>
<body>
  <div id="ac-progress" aria-hidden="true"></div>

  <header class="ac-topbar">
    <a class="ac-brand" href="#/" aria-label="Automatos Academy — home">
      <span class="ac-brand-mark" aria-hidden="true"></span>
      <span class="ac-brand-word">Automatos <em>Academy</em></span>
    </a>
    <nav class="ac-topnav" aria-label="Primary">
      <a href="#/" data-nav="catalog">Tracks</a>
      <a href="#/method" data-nav="method">The model</a>
      <a href="https://automatos.app" target="_blank" rel="noopener" class="ac-ext">automatos.app ↗</a>
    </nav>
    <button id="ac-mood" class="ac-mood" type="button" aria-label="Toggle light / dark">
      <span class="ac-mood-dot" aria-hidden="true"></span>
      <span class="ac-mood-label">Bone</span>
    </button>
  </header>

  <main id="app" class="ac-main" tabindex="-1">
    <div class="ac-boot">
      <span class="ac-boot-mark"></span>
      <p class="mono-label">Loading the Academy…</p>
    </div>
  </main>

  <footer class="ac-footer">
    <div class="ac-footer-row">
      <span class="mono-label">Automatos Academy</span>
      <span class="mono-label">The Automatos learning model</span>
      <span class="mono-label">Local-first · your progress stays on this device</span>
    </div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
